<svg xmlns="http://www.w3.org/2000/svg" width="320" height="200" viewBox="0 0 320 200" role="img">
  <title>managr</title>
  <desc>managr — file automation simplified</desc>

  <!-- Icon: rounded square — navy -->
  <rect x="112" y="8" width="96" height="96" rx="22" fill="#3A5884"/>

  <!-- File body — light surface -->
  <rect x="138" y="28" width="44" height="56" rx="5" fill="#EDF1FA"/>
  <!-- Dog-ear -->
  <polygon points="166,28 182,28 182,44" fill="#3A5884"/>
  <line x1="166" y1="28" x2="166" y2="44" stroke="#EDF1FA" stroke-width="1"/>
  <line x1="166" y1="44" x2="182" y2="44" stroke="#EDF1FA" stroke-width="1"/>

  <!-- Arrow on file — dark -->
  <line x1="144" y1="68" x2="168" y2="68" stroke="#161B23" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M163 63 L170 68 L163 73" fill="none" stroke="#161B23" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark — dark -->
  <text x="160" y="145"
    font-family="'Roboto', system-ui, sans-serif"
    font-weight="900"
    font-size="52"
    letter-spacing="-1"
    fill="#161B23"
    text-anchor="middle">managr</text>

  <!-- Tagline — steel -->
  <text x="160" y="168"
    font-family="'DM Mono', 'Courier New', monospace"
    font-weight="300"
    font-size="9"
    letter-spacing="3"
    fill="#6E7E9B"
    text-anchor="middle">FILE AUTOMATION · SIMPLIFIED</text>
</svg>
