<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img">
  <title>managr icon</title>
  <desc>managr app icon — file automation tool</desc>

  <!-- Rounded square — navy -->
  <rect x="0" y="0" width="96" height="96" rx="22" fill="#3A5884"/>

  <!-- File body — light surface -->
  <rect x="22" y="18" width="44" height="56" rx="5" fill="#EDF1FA"/>
  <!-- Dog-ear -->
  <polygon points="50,18 66,18 66,34" fill="#3A5884"/>
  <line x1="50" y1="18" x2="50" y2="34" stroke="#EDF1FA" stroke-width="1.25"/>
  <line x1="50" y1="34" x2="66" y2="34" stroke="#EDF1FA" stroke-width="1.25"/>

  <!-- Arrow — dark -->
  <line x1="28" y1="58" x2="54" y2="58" stroke="#161B23" stroke-width="3" stroke-linecap="round"/>
  <path d="M49 52 L57 58 L49 64" fill="none" stroke="#161B23" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
